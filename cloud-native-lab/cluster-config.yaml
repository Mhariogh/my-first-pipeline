apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: cloud-native-lab
  region: us-east-1
  version: '1.32'
managedNodeGroups:
  - name: ng-1
    instanceType: m5.large
    desiredCapacity: 2
    minSize: 1
    maxSize: 4
    iam:
      withAddonPolicies:
        albIngress: true
        ebs: true
iam:
  withOIDC: true
