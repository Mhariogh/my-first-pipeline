server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://backend-service:3000;
    proxy_set_header Host $host;
  }

  location /health {
    return 200 '{"status":"ok","service":"frontend"}';
    add_header Content-Type application/json;
  }
}
